# ===========================================
# BUSINESS FLOW CONFIGURATION
# ===========================================
# This file defines the hierarchical flow:
# Business Type -> Departments -> Agents -> Agent Configs

# Step 1: Business Types
business_types:
  ecommerce:
    title: "E-commerce"
    description: "Online retail, product sales, inventory management"
    icon: "🛒"
    icon_color: "#6017E8"
    # Recommended departments for this business type
    recommended_departments:
      - marketing
      - sales
      - customer_support
      - finance
    
  agency_creative:
    title: "Agency / Creative Studio"
    description: "Marketing, design, content creation, client services"
    icon: "🎨"
    icon_color: "#FB252A"
    recommended_departments:
      - marketing
      - sales
      - management_strategy
      - hr_people
    
  saas_tech:
    title: "SaaS / Tech Startup"
    description: "Software development, product management, growth"
    icon: "🚀"
    icon_color: "#51A2FF"
    recommended_departments:
      - marketing
      - sales
      - product_dev
      - customer_support
    
  consultant_freelancer:
    title: "Consultant / Freelancer"
    description: "Professional services, client management, expertise"
    icon: "👤"
    icon_color: "#FB7A2A"
    recommended_departments:
      - sales
      - personal_assistant
      - finance
      - marketing
    
  education:
    title: "Education"
    description: "Training, curriculum, student management, research"
    icon: "🎓"
    icon_color: "#28A745"
    recommended_departments:
      - marketing
      - hr_people
      - management_strategy
      - customer_support
    
  enterprise_corporate:
    title: "Enterprise / Corporate"
    description: "Large organization, multiple departments, compliance"
    icon: "🏢"
    icon_color: "#51A2FF"
    recommended_departments:
      - hr_people
      - management_strategy
      - finance
      - customer_support
    
  real_estate:
    title: "Real Estate"
    description: "Property sales, client management, listings, market analysis"
    icon: "🏠"
    icon_color: "#28A745"
    recommended_departments:
      - sales
      - marketing
      - customer_support
      - finance
    
  other:
    title: "Other"
    description: "Tell us more about your unique business needs"
    icon: "❓"
    icon_color: "#6C757D"
    recommended_departments:
      - marketing
      - sales
      - personal_assistant
      - customer_support

# Step 2: Departments with their agents
departments:
  marketing:
    title: "Marketing"
    description: "Social media, campaigns, content creation, SEO"
    icon: "📈"
    icon_color: "#6017E8"
    # Agents available in this department
    agents:
      - social_media_manager
      - content_strategist
      - campaign_manager
    
  sales:
    title: "Sales"
    description: "Lead generation, CRM, proposals, customer outreach"
    icon: "📊"
    icon_color: "#FB252A"
    agents:
      - lead_qualifier
      - proposal_writer
      - crm_assistant
    
  management_strategy:
    title: "Management & Strategy"
    description: "Planning, analytics, reporting, decision support"
    icon: "⚙️"
    icon_color: "#51A2FF"
    agents:
      - strategy_advisor
      - performance_analyst
      - project_coordinator
    
  hr_people:
    title: "HR & People Ops"
    description: "Recruiting, onboarding, employee engagement, policies"
    icon: "👥"
    icon_color: "#FB7A2A"
    agents:
      - recruiting_assistant
      - onboarding_specialist
      - policy_advisor
    
  personal_assistant:
    title: "Personal Assistant"
    description: "Scheduling, reminders, email management, research"
    icon: "👤"
    icon_color: "#28A745"
    agents:
      - executive_assistant
      - research_specialist
    
  customer_support:
    title: "Customer Support"
    description: "Help desk, ticket management, customer communication"
    icon: "🎧"
    icon_color: "#51A2FF"
    agents:
      - help_desk_agent
      - knowledge_manager
    
  finance:
    title: "Finance"
    description: "Budgeting, expense tracking, financial analysis, invoicing"
    icon: "💰"
    icon_color: "#FFC107"
    agents:
      - budget_analyst
      - invoice_manager
    
  product_dev:
    title: "Product / Dev"
    description: "Feature planning, user research, development support"
    icon: "💻"
    icon_color: "#6017E8"
    agents:
      - product_strategist
      - development_assistant

