# ===========================================
# SOL BOT - SOLAR SALES AGENT CONFIGURATION
# ===========================================

agent:
  # Unique identifier (no spaces, lowercase, use underscores)
  id: SOL

  # Emoji for display in UI and database
  emoji: "☀️"

  # Display name shown in the sidebar
  name: Solar Sales Assistant
  
  # Category - SALES for solar sales
  category: SALES
  
  # Short description for the sidebar
  description: "Solar sales expert - Calculate savings, design systems, close deals"
  
  # Specialization badge shown in chat header and right panel
  specialization: "Solar Energy Expert"
  
  # Tagline shown under agent name in right panel
  tagline: "Illuminate. Calculate. Convert."
  
  # Avatar URL (solar-themed avatar)
  avatar: "/Squidgy AI Assistants Avatars/5.png"
  
  # Pin to top of category
  pinned: true
  
  # Requires presetup configuration
  presetup_required: true
  presetup_page: /solar-config
  
  # Custom initial welcome message (supports HTML)
  initial_message: 'Hi! I''m SOL Bot, your solar energy expert. 🌞<br><br>I specialize in solar panel systems, ROI calculations, and helping you go green while saving green!<br><br>📋 <a href="/solar-config" target="_blank" style="color: #7c3aed; text-decoration: underline;">Complete Solar Setup</a> - Configure your solar offer details.'
  
  # Agent capabilities shown in right panel
  capabilities:
    - "Solar panel system sizing and design"
    - "ROI and payback period calculations"
    - "Energy consumption analysis"
    - "Federal and state incentive guidance"
    - "Shade analysis and roof assessment"
    - "Battery storage recommendations"
    - "Net metering calculations"
    - "Financing options comparison"
    - "Carbon footprint reduction estimates"
    - "Utility rate analysis"
  
  # Recent actions shown in right panel
  recent_actions:
    - "Calculated 25-year savings of $47,000 for residential system"
    - "Designed 10kW system with Tesla Powerwall"
    - "Analyzed time-of-use rates for optimal savings"
    - "Provided tax credit documentation for IRS Form 5695"
    - "Generated proposal for 50-panel commercial installation"

# N8N Webhook Configuration
n8n:
  # Webhook URL for solar calculations and integrations
  webhook_url: https://n8n.theaiteam.uk/webhook/sol_bot

# UI Configuration
ui:
  page_type: "standard"
  figma_url: ''
  figma_deployed_url: ''
  figma_token: figd_VBNaIIUBmyE1DNKT5SdAUXnRLBWjczDJ30N0DXkd

# UI Configuration - Generated
ui_use:
  page_type: single_page
  pages:
    - name: Solar Dashboard
      path: solar-dashboard
      order: 1
      validated: true

# Interface Configuration
interface:
  type: chat
  features:
    - text_input
    - file_upload  # For utility bills and roof photos
    - voice_input
    - suggestion_buttons
    - calculator_widget  # Solar savings calculator
    - map_integration  # For location-based analysis

# Suggestion buttons shown in chat interface
suggestions:
  - "Have I had any new leads today?"
  - "Show me this week's sales performance"
  - "Generate a proposal for commercial solar"
  - "What's the ROI calculation for this project?"
  - "Create a quote for residential installation"
  - "Schedule a site assessment appointment"
  - "Request a callback for this lead"
  - "Track my pipeline conversion rates"

# Agent personality configuration
personality:
  tone: enthusiastic  # Excited about solar energy
  style: educational  # Teaches while selling
  approach: consultative  # Focuses on customer needs and ROI

# Solar-specific configuration
solar_config:
  # Default values for calculations and UI
  defaults:
    # UI Configuration defaults
    installation_price: 2  # $/Watt
    dealer_fee: 15  # %
    broker_fee: 50  # $
    financing_apr: 5  # %
    financing_term: 240  # months (20 years)
    energy_price: 0.17  # $/kWh
    yearly_cost_increase: 4  # %
    installation_lifespan: 20  # years
    typical_panel_count: 40  # panels
    max_roof_segments: 4  # segments
    solar_incentive: 3  # %
    
    # Technical calculation defaults
    panel_wattage: 400  # watts per panel
    system_efficiency: 0.85  # 85% efficiency factor
    degradation_rate: 0.005  # 0.5% annual degradation
    electricity_rate_increase: 0.03  # 3% annual increase
  
  # Supported regions for incentive calculations
  regions:
    - US_Federal
    - California
    - Texas
    - Florida
    - Arizona
    - Nevada
    - New_York
    - Colorado
  
  # Integration capabilities
  integrations:
    - google_sunroof  # For shade analysis
    - pvwatts  # NREL calculator
    - utility_apis  # Rate schedule access
    - permit_databases  # Local permit requirements