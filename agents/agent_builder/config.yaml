  initial_message: Hey! 👋 I'm Ace, your Agent Creation Expert.<br><br>I create complete AI agents through a guided process:<br>✅ I'll ask you a few key questions about your agent<br>✅ Present a complete plan for your review<br>✅ Once you approve, I'll generate all files automatically<br>✅ Create config, system prompt, skills, and N8N workflow<br>✅ Publish to database - your agent goes live immediately!<br>✅ Provide files for your records and version control<br><br>Ready to create an agent? Let's start with the basics!
