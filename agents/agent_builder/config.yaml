skills:
  - name: Base System Prompt Reference
    description: |
      Reference for base system prompt content that is automatically added to ALL agents. When creating agent system prompts, avoid duplicating or overwriting anything already mentioned in this base prompt (core principles, response format, security, tone, error handling).
    file: base_system_prompt.md
  - name: Agent Configuration Template
    description: |
      Standard template for agent config.yaml files. When creating config.yaml, review this template and customize all fields based on user requirements and inferred agent characteristics.
    file: agent_template.yaml
  - name: Intelligent Inference
    description: |
      Automatically infer agent requirements from minimal user input using keyword detection, category mapping, capability extraction, and smart defaults for personality and configuration.
    file: intelligent_inference.md
  - name: Configuration Generation
    description: |
      Explains WHY config.yaml is critical (agent foundation) and HOW to create it by consulting the Agent Configuration Template skill. Covers importance, critical decisions, suggestion buttons, recent actions, YAML formatting, and validation.
    file: config_generation.md
  - name: System Prompt Generation
    description: |
      Explains WHY system_prompt.md is essential (agent's brain) and HOW to create it by consulting the Base System Prompt Reference skill first. Emphasizes keeping it minimal (50-100 lines with skills) and avoiding duplication of base prompt content.
    file: system_prompt_generation.md
  - name: Skills Generation
    description: |
      Core principle: Keep system prompts MINIMAL by breaking detailed content into skill files. Covers when to create skills (20+ line processes), how to identify them, handling user-uploaded skills from KB, naming conventions, folder structure (/skills), and packaging in final zip.
    file: skills_generation.md
  - name: N8N Workflow Generation
    description: |
      Generate complete N8N workflow JSON files with proper node configuration, connections, credentials, and conditional logic based on agent complexity tier.
    file: n8n_workflow_generation.md
  - name: Package & Deployment
    description: |
      Create complete agent packages with all files, generate deployment README, create zip file, upload to Supabase storage, and provide download link with instructions.
    file: package_deployment.md
