# ===========================================
# AGENT CONFIGURATION TEMPLATE
# ===========================================
# Instructions:
# 1. Copy this file and rename it to: your_agent_id.yaml
# 2. Fill in all the fields below
# 3. Run: node scripts/import-multipage-agent.js agents/configs/your_agent_id.yaml
# 4. Restart dev server: npm run dev
# ===========================================

agent:
  # Unique identifier (no spaces, lowercase, use underscores)
  # Example: "newsletter_agent", "crm_manager", "lead_generator"
  id: "your_agent_id"
  
  # Display name shown in the sidebar
  # Example: "Newsletter Agent", "CRM Manager", "Lead Generator"
  name: "Your Agent Name"
  
  # Category - Choose ONE from: MARKETING, SALES, HR, SUPPORT, OPERATIONS
  category: "MARKETING"
  
  # Short description for the sidebar (keep it brief)
  # Example: "Create and manage newsletters", "Track customer interactions"
  description: "Brief description of what this agent does"
  
  # Specialization badge shown in chat header and right panel (optional)
  # Example: "Creative & Trendy", "Data Expert", "Lead Specialist"
  specialization: "Expert Level"
  
  # Tagline shown under agent name in right panel (optional)
  # Example: "Create. Design. Deliver.", "Track. Analyze. Convert."
  tagline: "Action. Create. Deliver."
  
  # Avatar URL (optional - you can use dicebear API with any seed word)
  # Just change the seed= parameter to any word
  avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=your_agent"
  
  # Pin to top of sidebar - true or false
  pinned: false
  
  # Agent capabilities shown in right panel (list your agent's main features)
  capabilities:
    - "Primary capability or main function"
    - "Secondary feature or service provided"
    - "Integration or special functionality"
    - "Advanced feature or automation"
    - "Additional service or tool"
  
  # Recent actions shown in right panel (can be examples or dynamic)
  # These help users understand what the agent has done recently
  recent_actions:
    - "Completed a recent task or project"
    - "Generated content or performed analysis"
    - "Processed user request or data"
    - "Automated workflow or integration"

# N8N Webhook Configuration
n8n:
  # Your N8N webhook URL
  webhook_url: "https://n8n.theaiteam.uk/webhook/your-webhook-name"

# UI Configuration
ui:
  # Page type - Choose ONE:
  # - "multi_page" = Creates carousel with multiple pages
  # - "standard" = Creates single chat interface
  page_type: "multi_page"
  
  # ===== OPTION 1: Figma API URLs =====
  # Get these from Figma: File menu > Share > Copy link
  # For multiple pages, separate with commas
  # Leave empty if using deployed URLs instead
  figma_url: >
  
  # ===== OPTION 2: Deployed Figma URLs =====
  # Get these from Figma prototype or deployed sites
  # For multiple pages, separate with commas
  # Make sure each URL ends with /
  # Example format:
  # figma_deployed_url: >
  #   https://your-design-12345.figma.site/,
  #   https://another-page-67890.figma.site/,
  #   https://third-page-11111.figma.site/
  figma_deployed_url: >
    
  
  # Figma access token - KEEP THIS AS IS (uses environment variable)
  figma_token: "${FIGMA_ACCESS_TOKEN}"

# ===========================================
# DO NOT EDIT BELOW - AUTO-GENERATED SECTION
# ===========================================
