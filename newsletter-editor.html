<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peritus Newsletter Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --accent-color: #4fc3f7;
            --background-color: #f5f7fa;
            --text-color: #333;
            --light-text: #666;
            --border-color: #ddd;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        header h1 {
            margin: 0;
            color: var(--primary-color);
        }
        
        .editor-container {
            display: flex;
            gap: 20px;
            height: calc(100vh - 150px);
        }
        
        .newsletter-preview {
            flex: 1;
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        /* Make text elements editable */
        .newsletter-preview [contenteditable="true"] {
            outline: none;
            transition: background-color 0.2s;
        }
        
        .newsletter-preview [contenteditable="true"]:hover {
            background-color: #f0f8ff;
        }
        
        .newsletter-preview [contenteditable="true"]:focus {
            background-color: #e6f3ff;
            box-shadow: 0 0 0 2px rgba(74, 111, 165, 0.2);
        }
        
        /* Formatting Toolbar */
        .formatting-toolbar {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .toolbar-separator {
            width: 1px;
            height: 30px;
            background-color: var(--border-color);
        }
        
        .toolbar-btn {
            background-color: #f5f5f5;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
            font-size: 14px;
        }
        
        .toolbar-btn:hover {
            background-color: #e0e0e0;
            border-color: var(--primary-color);
        }
        
        .toolbar-btn:active,
        .toolbar-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .toolbar-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-color);
            margin-right: 5px;
        }
        
        .toolbar-select {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .toolbar-select:hover {
            border-color: var(--primary-color);
        }
        
        .toolbar-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 111, 165, 0.2);
        }
        
        .color-picker-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .color-display-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: #f5f5f5;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .color-display-btn:hover {
            background-color: #e0e0e0;
            border-color: var(--primary-color);
        }
        
        .color-box {
            width: 20px;
            height: 20px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background-color: #000000;
            display: inline-block;
        }
        
        .color-display-btn i {
            font-size: 12px;
            color: var(--text-color);
        }
        
        .toolbar-color-picker-hidden {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        
        .editor-controls {
            width: 300px;
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--secondary-color);
            font-size: 1.1rem;
        }
        
        .image-placeholder {
            background-color: #e9f5ff;
            border: 2px dashed #4a6fa5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            text-align: center;
            position: relative;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4a6fa5;
        }
        
        .image-placeholder-label {
            display: block;
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }
        
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background-color 0.2s;
        }
        
        .btn:hover {
            background-color: var(--secondary-color);
        }
        
        .btn-success {
            background-color: #4CAF50;
        }
        
        .btn-success:hover {
            background-color: #388e3c;
        }
        
        .btn-block {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 10px;
        }
        
        .image-preview {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .hidden {
            display: none;
        }
        
        .placeholder-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
        }
        
        .placeholder-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        
        .placeholder-item:hover {
            background-color: #f0f0f0;
        }
        
        .placeholder-item.active {
            background-color: #e3f2fd;
            border-left: 3px solid var(--primary-color);
        }
        
        .action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Peritus Newsletter Editor</h1>
            <div class="action-buttons">
                <button id="download-btn" class="btn">
                    <i class="fas fa-download"></i> Download Newsletter
                </button>
                <button id="close-btn" class="btn">
                    <i class="fas fa-times"></i> Close Editor
                </button>
            </div>
        </header>
        
        <!-- Text Formatting Toolbar -->
        <div class="formatting-toolbar" id="formatting-toolbar" style="display: none;">
            <div class="toolbar-group">
                <button class="toolbar-btn" id="bold-btn" title="Bold">
                    <i class="fas fa-bold"></i>
                </button>
                <button class="toolbar-btn" id="italic-btn" title="Italic">
                    <i class="fas fa-italic"></i>
                </button>
                <button class="toolbar-btn" id="underline-btn" title="Underline">
                    <i class="fas fa-underline"></i>
                </button>
            </div>
            
            <div class="toolbar-separator"></div>
            
            <div class="toolbar-group">
                <label class="toolbar-label">Size:</label>
                <select id="font-size-select" class="toolbar-select">
                    <option value="">Default</option>
                    <option value="12px">12px</option>
                    <option value="14px">14px</option>
                    <option value="16px">16px</option>
                    <option value="18px">18px</option>
                    <option value="20px">20px</option>
                    <option value="24px">24px</option>
                    <option value="28px">28px</option>
                    <option value="32px">32px</option>
                </select>
            </div>
            
            <div class="toolbar-separator"></div>
            
            <div class="toolbar-group">
                <label class="toolbar-label">Font:</label>
                <select id="font-family-select" class="toolbar-select">
                    <option value="">Default</option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Courier New', monospace">Courier New</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="Verdana, sans-serif">Verdana</option>
                    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                </select>
            </div>
            
            <div class="toolbar-separator"></div>
            
            <div class="toolbar-group">
                <label class="toolbar-label">Color:</label>
                <div class="color-picker-wrapper">
                    <button class="color-display-btn" id="color-display-btn" title="Current text color">
                        <span class="color-box" id="color-box"></span>
                        <i class="fas fa-caret-down"></i>
                    </button>
                    <input type="color" id="text-color-picker" class="toolbar-color-picker-hidden" title="Text Color">
                </div>
            </div>
            
            <div class="toolbar-separator"></div>
            
            <div class="toolbar-group">
                <button class="toolbar-btn" id="remove-format-btn" title="Clear Formatting">
                    <i class="fas fa-remove-format"></i>
                </button>
            </div>
        </div>
        
        <div class="editor-container">
            <div class="newsletter-preview" id="newsletter-preview">
                <!-- Newsletter content will be loaded here -->
                <div class="loading">Loading newsletter content...</div>
            </div>
            
            <div class="editor-controls">
                <div class="control-group">
                    <h3>Image Placeholders</h3>
                    <div id="placeholder-list" class="placeholder-list">
                        <!-- Placeholder items will be generated here -->
                        <div class="placeholder-item">No placeholders found</div>
                    </div>
                </div>
                
                <div class="control-group" id="upload-controls">
                    <h3>Upload Image</h3>
                    <div id="selected-placeholder" class="image-placeholder hidden">
                        <span class="image-placeholder-label">Selected: <span id="placeholder-name">None</span></span>
                        <input type="file" id="image-upload" accept="image/*" class="hidden">
                        <button id="select-image-btn" class="btn btn-block">
                            <i class="fas fa-upload"></i> Select Image
                        </button>
                        <div id="image-preview-container" class="hidden">
                            <img id="image-preview" class="image-preview" src="" alt="Preview">
                            <button id="change-image-btn" class="btn btn-block">
                                <i class="fas fa-exchange-alt"></i> Change Image
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="control-group">
                    <div style="background-color: #e6f3ff; padding: 12px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid var(--primary-color);">
                        <p style="margin: 0; font-size: 0.9rem; color: var(--text-color);">
                            <i class="fas fa-info-circle" style="color: var(--primary-color);"></i>
                            <strong>Tip:</strong> Click on any text in the newsletter to edit it directly!
                        </p>
                    </div>
                    <button id="save-newsletter-btn" class="btn btn-success btn-block">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const newsletterPreview = document.getElementById('newsletter-preview');
            const placeholderList = document.getElementById('placeholder-list');
            const selectedPlaceholder = document.getElementById('selected-placeholder');
            const placeholderName = document.getElementById('placeholder-name');
            const imageUpload = document.getElementById('image-upload');
            const selectImageBtn = document.getElementById('select-image-btn');
            const imagePreviewContainer = document.getElementById('image-preview-container');
            const imagePreview = document.getElementById('image-preview');
            const changeImageBtn = document.getElementById('change-image-btn');
            const saveNewsletterBtn = document.getElementById('save-newsletter-btn');
            const downloadBtn = document.getElementById('download-btn');
            const closeBtn = document.getElementById('close-btn');
            
            // State
            let newsletterHtml = '';
            let selectedPlaceholderId = null;
            let placeholders = [];
            let uploadedImages = {};
            
            // Get newsletter HTML from localStorage
            function loadNewsletterHtml() {
                console.log('Loading newsletter HTML from localStorage...');
                
                // Always use localStorage for HTML content
                const storedHtml = localStorage.getItem('newsletter_html_for_editor') || localStorage.getItem('newsletter_html');
                
                if (storedHtml) {
                    console.log('Found HTML in localStorage, length:', storedHtml.length);
                    newsletterHtml = storedHtml;
                    renderNewsletter();
                } else {
                    console.error('No HTML found in localStorage');
                    newsletterPreview.innerHTML = `
                        <div style="padding: 20px; text-align: center;">
                            <h2>No Newsletter Content Found</h2>
                            <p>Please return to the main application and try again.</p>
                            <p>If you're seeing this message, it means no newsletter HTML was found in localStorage.</p>
                            <button onclick="window.close()" style="padding: 10px 20px; background-color: #4a6fa5; color: white; border: none; border-radius: 4px; cursor: pointer;">Close Editor</button>
                        </div>
                    `;
                }
            }
            
            // Render the newsletter content
            function renderNewsletter() {
                // Set the HTML content
                newsletterPreview.innerHTML = newsletterHtml;
                
                // Find all [IMG_HERE] placeholders
                findPlaceholders();
            }
            
            // Find all [IMG_HERE] placeholders in the newsletter
            function findPlaceholders() {
                console.log('Finding placeholders in:', newsletterPreview.innerHTML);
                placeholders = [];
                let index = 0;
                
                // First, do a direct string replacement in the HTML
                // This ensures we catch all instances regardless of DOM structure
                let html = newsletterPreview.innerHTML;
                
                // Use a single comprehensive regex to match all image placeholder variations
                // This prevents double-counting the same placeholder
                const placeholderRegex = /\[(IMG_HERE|img_here|image)\]/gi;
                
                html = html.replace(placeholderRegex, (match) => {
                    const placeholderId = `placeholder-${index++}`;
                    return `<div class="image-placeholder" id="${placeholderId}" data-placeholder="true">[IMG_HERE]</div>`;
                });
                
                // Update the HTML with our processed version
                newsletterPreview.innerHTML = html;
                
                // Make all text elements editable
                makeTextEditable();
                
                console.log('Processed HTML with placeholders');
                
                // Now find all the placeholder divs we created
                const placeholderElements = newsletterPreview.querySelectorAll('.image-placeholder[data-placeholder="true"]');
                console.log('Found placeholder elements:', placeholderElements.length);
                
                // Only look for empty img tags if we found NO text placeholders at all
                if (placeholderElements.length === 0) {
                    console.log('No text placeholders found, looking for empty img tags');
                    const emptyImgTags = newsletterPreview.querySelectorAll('img:not([src]), img[src=""], img[src="#"]');
                    
                    emptyImgTags.forEach((img) => {
                        // Skip if this img is already inside a placeholder div
                        if (img.closest('.image-placeholder')) {
                            return;
                        }
                        
                        const placeholderId = `placeholder-${index++}`;
                        img.id = placeholderId;
                        img.dataset.placeholder = 'true';
                        img.classList.add('image-placeholder');
                    });
                    
                    console.log('Found empty img tags:', emptyImgTags.length);
                }
                
                // Get the final list of placeholders (only those with data-placeholder="true")
                const finalPlaceholders = newsletterPreview.querySelectorAll('[data-placeholder="true"]');
                
                // Add them to our placeholders array
                finalPlaceholders.forEach((element, i) => {
                    placeholders.push({
                        id: element.id,
                        element: element,
                        name: `Placeholder ${i + 1}`
                    });
                });
                
                console.log('Placeholders array:', placeholders);
                
                // Update the placeholder list
                updatePlaceholderList();
            }
            
            // Update the placeholder list in the sidebar
            function updatePlaceholderList() {
                placeholderList.innerHTML = '';
                
                if (placeholders.length === 0) {
                    placeholderList.innerHTML = '<div class="placeholder-item">No placeholders found</div>';
                    return;
                }
                
                placeholders.forEach(placeholder => {
                    const item = document.createElement('div');
                    item.className = 'placeholder-item';
                    item.dataset.id = placeholder.id;
                    item.textContent = placeholder.name;
                    
                    item.addEventListener('click', () => {
                        selectPlaceholder(placeholder.id);
                    });
                    
                    placeholderList.appendChild(item);
                });
            }
            
            // Select a placeholder for image upload
            function selectPlaceholder(id) {
                selectedPlaceholderId = id;
                
                // Update UI
                document.querySelectorAll('.placeholder-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.id === id) {
                        item.classList.add('active');
                    }
                });
                
                const placeholder = placeholders.find(p => p.id === id);
                if (placeholder) {
                    placeholderName.textContent = placeholder.name;
                    selectedPlaceholder.classList.remove('hidden');
                    
                    // Check if we already have an image for this placeholder
                    if (uploadedImages[id]) {
                        imagePreview.src = uploadedImages[id];
                        imagePreviewContainer.classList.remove('hidden');
                        selectImageBtn.classList.add('hidden');
                    } else {
                        imagePreviewContainer.classList.add('hidden');
                        selectImageBtn.classList.remove('hidden');
                    }
                }
            }
            
            // Event Listeners
            selectImageBtn.addEventListener('click', () => {
                imageUpload.click();
            });
            
            changeImageBtn.addEventListener('click', () => {
                imageUpload.click();
            });
            
            imageUpload.addEventListener('change', (event) => {
                if (event.target.files && event.target.files[0]) {
                    const file = event.target.files[0];
                    const reader = new FileReader();
                    
                    reader.onload = (e) => {
                        const imageData = e.target.result;
                        
                        // Store the image
                        uploadedImages[selectedPlaceholderId] = imageData;
                        
                        // Update preview
                        imagePreview.src = imageData;
                        imagePreviewContainer.classList.remove('hidden');
                        selectImageBtn.classList.add('hidden');
                        
                        // Update the placeholder in the newsletter
                        updatePlaceholderImage(selectedPlaceholderId, imageData);
                    };
                    
                    reader.readAsDataURL(file);
                }
            });
            
            // Update a placeholder with an image
            function updatePlaceholderImage(id, imageData) {
                console.log('Updating placeholder image for ID:', id);
                const placeholder = document.getElementById(id);
                if (placeholder) {
                    console.log('Found placeholder element:', placeholder);
                    
                    // Create an image element
                    const img = document.createElement('img');
                    img.src = imageData;
                    img.style.maxWidth = '100%';
                    img.style.height = 'auto';
                    img.style.display = 'block';
                    img.style.margin = '0 auto';
                    
                    // Replace the placeholder with the image
                    placeholder.innerHTML = '';
                    placeholder.appendChild(img);
                    placeholder.style.background = 'none';
                    placeholder.style.border = 'none';
                    placeholder.style.padding = '0';
                    
                    console.log('Placeholder updated with image');
                } else {
                    console.error('Placeholder element not found for ID:', id);
                }
            }
            
            // Save the newsletter with all images
            saveNewsletterBtn.addEventListener('click', () => {
                // Get the current HTML with all images
                const updatedHtml = newsletterPreview.innerHTML;
                
                // Store in localStorage for the main app to retrieve
                localStorage.setItem('edited_newsletter_html', updatedHtml);
                
                // Notify the user
                alert('Newsletter saved! You can now close this editor.');
            });
            
            // Download the newsletter as HTML
            downloadBtn.addEventListener('click', () => {
                // Get the current HTML
                const html = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peritus Newsletter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        h1, h2, h3 {
            color: #166088;
        }
    </style>
</head>
<body>
    ${newsletterPreview.innerHTML}
</body>
</html>`;
                
                // Create a blob and download
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `peritus-newsletter-${new Date().toISOString().slice(0, 10)}.html`;
                document.body.appendChild(a);
                a.click();
                
                // Clean up
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
            });
            
            // Close the editor
            closeBtn.addEventListener('click', () => {
                // Check if there are unsaved changes
                if (Object.keys(uploadedImages).length > 0) {
                    const confirm = window.confirm('Do you want to save your changes before closing?');
                    if (confirm) {
                        // Save changes first
                        saveNewsletterBtn.click();
                    }
                }
                
                // Close the window or redirect back
                if (window.opener) {
                    window.close();
                } else {
                    window.location.href = 'index.html';
                }
            });
            
            // Text Formatting Toolbar Elements
            const formattingToolbar = document.getElementById('formatting-toolbar');
            const boldBtn = document.getElementById('bold-btn');
            const italicBtn = document.getElementById('italic-btn');
            const underlineBtn = document.getElementById('underline-btn');
            const fontSizeSelect = document.getElementById('font-size-select');
            const fontFamilySelect = document.getElementById('font-family-select');
            const textColorPicker = document.getElementById('text-color-picker');
            const colorDisplayBtn = document.getElementById('color-display-btn');
            const colorBox = document.getElementById('color-box');
            const removeFormatBtn = document.getElementById('remove-format-btn');
            
            let currentEditableElement = null;
            
            // Show/hide toolbar when text is focused
            newsletterPreview.addEventListener('focusin', (e) => {
                if (e.target.hasAttribute('contenteditable')) {
                    currentEditableElement = e.target;
                    formattingToolbar.style.display = 'flex';
                    updateToolbarState();
                }
            });
            
            // Update toolbar button states based on current selection
            function updateToolbarState() {
                if (!currentEditableElement) return;
                
                // Check if bold, italic, underline are applied
                const isBold = document.queryCommandState('bold');
                const isItalic = document.queryCommandState('italic');
                const isUnderline = document.queryCommandState('underline');
                
                boldBtn.classList.toggle('active', isBold);
                italicBtn.classList.toggle('active', isItalic);
                underlineBtn.classList.toggle('active', isUnderline);
                
                // Update color box to show current text color
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    const container = range.commonAncestorContainer;
                    const element = container.nodeType === 3 ? container.parentElement : container;
                    
                    if (element) {
                        const color = window.getComputedStyle(element).color;
                        // Convert rgb to hex for the color box
                        const rgb = color.match(/\d+/g);
                        if (rgb && rgb.length >= 3) {
                            const hex = '#' + rgb.slice(0, 3).map(x => {
                                const h = parseInt(x).toString(16);
                                return h.length === 1 ? '0' + h : h;
                            }).join('');
                            colorBox.style.backgroundColor = hex;
                        }
                    }
                }
            }
            
            // Bold button
            boldBtn.addEventListener('click', (e) => {
                e.preventDefault();
                document.execCommand('bold', false, null);
                updateToolbarState();
                currentEditableElement.focus();
            });
            
            // Italic button
            italicBtn.addEventListener('click', (e) => {
                e.preventDefault();
                document.execCommand('italic', false, null);
                updateToolbarState();
                currentEditableElement.focus();
            });
            
            // Underline button
            underlineBtn.addEventListener('click', (e) => {
                e.preventDefault();
                document.execCommand('underline', false, null);
                updateToolbarState();
                currentEditableElement.focus();
            });
            
            // Font size
            fontSizeSelect.addEventListener('change', (e) => {
                const size = e.target.value;
                if (size && currentEditableElement) {
                    document.execCommand('fontSize', false, '7');
                    const fontElements = currentEditableElement.querySelectorAll('font[size="7"]');
                    fontElements.forEach(el => {
                        el.removeAttribute('size');
                        el.style.fontSize = size;
                    });
                    currentEditableElement.focus();
                }
            });
            
            // Font family
            fontFamilySelect.addEventListener('change', (e) => {
                const font = e.target.value;
                if (font && currentEditableElement) {
                    document.execCommand('fontName', false, font);
                    currentEditableElement.focus();
                }
            });
            
            // Color display button - opens the color picker
            colorDisplayBtn.addEventListener('click', (e) => {
                e.preventDefault();
                textColorPicker.click();
            });
            
            // Text color picker
            textColorPicker.addEventListener('input', (e) => {
                const color = e.target.value;
                if (currentEditableElement) {
                    // Update the color box display
                    colorBox.style.backgroundColor = color;
                    
                    // Apply the color to selected text
                    document.execCommand('foreColor', false, color);
                    currentEditableElement.focus();
                }
            });
            
            // Also handle change event for better compatibility
            textColorPicker.addEventListener('change', (e) => {
                const color = e.target.value;
                if (currentEditableElement) {
                    // Update the color box display
                    colorBox.style.backgroundColor = color;
                    
                    // Apply the color
                    document.execCommand('foreColor', false, color);
                    currentEditableElement.focus();
                }
            });
            
            // Remove formatting
            removeFormatBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (currentEditableElement) {
                    document.execCommand('removeFormat', false, null);
                    updateToolbarState();
                    currentEditableElement.focus();
                }
            });
            
            // Make text elements editable
            function makeTextEditable() {
                // Select common text elements (excluding image placeholders)
                const textElements = newsletterPreview.querySelectorAll(
                    'p, h1, h2, h3, h4, h5, h6, span, div:not(.image-placeholder), td, th, li, a'
                );
                
                textElements.forEach(element => {
                    // Skip if it's an image placeholder or already editable
                    if (element.classList.contains('image-placeholder') || 
                        element.hasAttribute('contenteditable')) {
                        return;
                    }
                    
                    // Skip if element only contains an image placeholder
                    const hasOnlyPlaceholder = element.children.length === 1 && 
                        element.children[0].classList.contains('image-placeholder');
                    if (hasOnlyPlaceholder) {
                        return;
                    }
                    
                    // Make it editable
                    element.setAttribute('contenteditable', 'true');
                });
                
                console.log('Made', textElements.length, 'elements editable');
            }
            
            // Re-apply editability after image updates
            const originalUpdatePlaceholderImage = updatePlaceholderImage;
            updatePlaceholderImage = function(id, imageData) {
                originalUpdatePlaceholderImage(id, imageData);
                // Re-apply editability in case new elements were added
                setTimeout(() => makeTextEditable(), 100);
            };
            
            // Initialize
            loadNewsletterHtml();
        });
    </script>
</body>
</html>
